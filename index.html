<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dubai Live Trade | Member Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020408; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .auth-input { background: #0f172a; border: 1px solid #1e293b; padding: 14px; border-radius: 14px; width: 100%; color: white; outline: none; font-size: 13px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .history-card { background: #0a0f1d; border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .status-badge { padding: 4px 12px; border-radius: 50px; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .pending { background: rgba(234, 179, 8, 0.1); color: #eab308; }
        .success { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .failed { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .option-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; cursor: pointer; transition: 0.3s; margin-bottom: 12px; }
        .option-card:hover { background: rgba(234, 179, 8, 0.1); border-color: #eab308; }
    </style>
</head>
<body>

    <div id="authSec" class="flex items-center justify-center min-h-screen p-6">
        <div class="glass w-full max-w-sm p-10 rounded-[40px] text-center shadow-2xl">
            <h1 class="text-3xl font-black text-white italic uppercase mb-10">Dubai Live Trade</h1>
            <input type="email" id="email" placeholder="Email" class="auth-input mb-4">
            <input type="password" id="pass" placeholder="Password" class="auth-input mb-8">
            <button onclick="login()" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase text-xs">Login</button>
        </div>
    </div>

    <div id="dashboard" class="hidden p-6 max-w-md mx-auto">
        <header class="flex justify-between items-center py-8">
            <div class="flex items-center gap-4">
                <div onclick="showM('profileM')" class="w-12 h-12 rounded-2xl bg-yellow-500 flex items-center justify-center text-xl cursor-pointer">👤</div>
                <div>
                    <h2 id="balanceDisp" class="text-3xl font-black text-white">$0.00</h2>
                    <p class="text-[9px] text-gray-500 font-bold uppercase">Total Balance</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="openDep()" class="bg-white text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase">Deposit</button>
                <button onclick="openWit()" class="bg-red-500 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Withdraw</button>
            </div>
        </header>

        <div class="mt-10">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-[11px] font-black text-white uppercase italic tracking-widest">History</h3>
                <div class="flex gap-4">
                    <button onclick="loadHistory('requests')" class="text-[10px] font-bold text-green-500 uppercase">Deposits</button>
                    <button onclick="loadHistory('withdrawals')" class="text-[10px] font-bold text-red-500 uppercase">Withdraws</button>
                </div>
            </div>
            <div id="historyList"></div>
        </div>
    </div>

    <div id="depM" class="modal">
        <div class="glass p-8 rounded-[40px] w-full max-w-sm">
            <div id="d0">
                <h2 class="text-sm font-black text-center mb-6 uppercase italic">Deposit Method</h2>
                <div onclick="selectDepMethod('crypto')" class="option-card text-center">
                    <p class="text-white font-bold">Deposit Crypto</p>
                    <p class="text-[10px] text-gray-500">USDT (BEP20)</p>
                </div>
                <div onclick="selectDepMethod('pkr')" class="option-card text-center">
                    <p class="text-white font-bold">Deposit PKR</p>
                    <p class="text-[10px] text-gray-500">Local Banks</p>
                </div>
            </div>
            <div id="d1" class="hidden">
                <h2 id="depTitle" class="text-sm font-black text-center mb-6 uppercase italic">Amount</h2>
                <input type="number" id="dAmount" oninput="calcUsdDep()" placeholder="Enter Amount" class="auth-input mb-2 text-center">
                <p id="usdConvertDep" class="text-center text-[10px] text-yellow-500 font-bold mb-6 hidden"></p>
                <button onclick="toStepDep(2)" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase text-xs">Next</button>
            </div>
            <div id="d2" class="hidden text-center">
                <p class="text-[10px] font-black text-yellow-500 mb-4 uppercase">Dubai Live Trade Merchant</p>
                <img id="depQR" src="" class="mx-auto mb-4 rounded-2xl w-44 h-44 object-contain bg-white p-2">
                <p id="cryptoAddr" class="text-[9px] text-gray-400 break-all mb-6 px-4 hidden">0x76ecfe8a3bd89297189e16cdcd275d743fb71a62</p>
                <button onclick="toStepDep(3)" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase text-xs">I Have Paid</button>
            </div>
            <div id="d3" class="hidden space-y-4">
                <input type="text" id="dName" placeholder="Account Name / Sender" class="auth-input">
                <input type="number" id="dSent" placeholder="Exact Sent Amount" class="auth-input">
                <input type="text" id="dTxid" placeholder="Transaction ID / TXID" class="auth-input">
                <button onclick="submitDep()" class="w-full py-4 bg-green-500 text-black font-black rounded-2xl uppercase text-xs">Submit Request</button>
            </div>
            <button onclick="hideM('depM')" class="w-full mt-6 text-[10px] font-bold text-gray-600 uppercase text-center">Close</button>
        </div>
    </div>

    <div id="witM" class="modal">
        <div class="glass p-8 rounded-[40px] w-full max-w-sm">
            <div id="w0">
                <h2 class="text-sm font-black text-center mb-6 uppercase italic">Withdraw Method</h2>
                <div onclick="selectWitMethod('crypto')" class="option-card text-center">
                    <p class="text-white font-bold">Withdraw Crypto</p>
                    <p class="text-[10px] text-gray-500">USDT / BNB Wallet</p>
                </div>
                <div onclick="selectWitMethod('pkr')" class="option-card text-center">
                    <p class="text-white font-bold">Withdraw PKR</p>
                    <p class="text-[10px] text-gray-500">JazzCash / Bank Transfer</p>
                </div>
            </div>
            <div id="wC" class="hidden space-y-4">
                <select id="wcNet" class="auth-input"><option>USDT (BEP20)</option><option>USDT (TRC20)</option><option>BNB (BEP20)</option></select>
                <input type="text" id="wcWallet" placeholder="Wallet Address" class="auth-input">
                <input type="number" id="wcAmt" placeholder="Amount ($)" class="auth-input">
                <button onclick="submitWitCrypto()" class="w-full py-4 bg-white text-black font-black rounded-2xl uppercase text-xs">Withdraw Crypto</button>
            </div>
            <div id="wP" class="hidden space-y-4">
                <select id="wBank" class="auth-input"><option>JazzCash</option><option>EasyPaisa</option><option>HBL Bank</option></select>
                <input type="text" id="wAccNum" placeholder="Account Number" class="auth-input">
                <input type="text" id="wAccName" placeholder="Account Name" class="auth-input">
                <input type="number" id="wAmt" placeholder="Amount (PKR)" class="auth-input">
                <button onclick="submitWitPkr()" class="w-full py-4 bg-white text-black font-black rounded-2xl uppercase text-xs">Withdraw PKR</button>
            </div>
            <button onclick="hideM('witM')" class="w-full mt-6 text-[10px] font-bold text-gray-600 uppercase text-center">Close</button>
        </div>
    </div>

    <div id="profileM" class="modal">
        <div class="glass p-8 rounded-[35px] w-full max-w-xs text-center">
            <p id="uEmail" class="text-white font-black text-xs mb-6"></p>
            <button onclick="auth.signOut().then(()=>location.reload())" class="w-full py-4 bg-red-500/10 text-red-500 rounded-2xl font-black uppercase text-[10px]">Logout Account</button>
            <button onclick="hideM('profileM')" class="mt-6 text-[10px] text-gray-600 font-bold uppercase">Back</button>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = { 
            apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", 
            authDomain: "waqas-47f30.firebaseapp.com", 
            projectId: "waqas-47f30", 
            storageBucket: "waqas-47f30.appspot.com", 
            messagingSenderId: "374104279093", 
            appId: "1:374104279093:web:6e1844b60456c700940364" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        let currentDepMethod = '';
        let userBalance = 0;

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('authSec').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('uEmail').innerText = user.email;
                
                // Real-time Balance & Balance Add Logic
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    if(doc.exists) {
                        userBalance = doc.data().balance || 0;
                        document.getElementById('balanceDisp').innerText = "$" + userBalance.toFixed(2);
                    }
                });

                // Status Checker for auto-adding balance
                db.collection('requests').where('uid', '==', user.uid).where('status', '==', 'Success').onSnapshot(snap => {
                    snap.docChanges().forEach(change => {
                        if (change.type === "added" || change.type === "modified") {
                            const data = change.doc.data();
                            if(!data.addedToBalance) {
                                const addAmt = data.currency === 'PKR' ? (data.amount / 280) : parseFloat(data.amount);
                                db.collection('users').doc(user.uid).update({ balance: firebase.firestore.FieldValue.increment(addAmt) });
                                db.collection('requests').doc(change.doc.id).update({ addedToBalance: true });
                            }
                        }
                    });
                });
                loadHistory('requests');
            } else {
                document.getElementById('authSec').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
            }
        });

        async function login() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert(err.message); }
        }

        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; }

        // DEPOSIT LOGIC
        function openDep() { showM('depM'); toStepDep(0); }
        function toStepDep(s) { ['d0','d1','d2','d3'].forEach(d => document.getElementById(d).classList.add('hidden')); document.getElementById('d'+s).classList.remove('hidden'); }
        
        function selectDepMethod(m) {
            currentDepMethod = m;
            const title = document.getElementById('depTitle'), input = document.getElementById('dAmount');
            if(m === 'crypto') {
                title.innerText = "Amount (USD)"; input.placeholder = "Enter Dollars";
                document.getElementById('depQR').src = "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=0x76ecfe8a3bd89297189e16cdcd275d743fb71a62";
                document.getElementById('cryptoAddr').classList.remove('hidden');
            } else {
                title.innerText = "Amount (PKR)"; input.placeholder = "Enter PKR";
                document.getElementById('depQR').src = "https://i.postimg.cc/HLPQpW92/Screenshot-20260504-033311.jpg";
                document.getElementById('cryptoAddr').classList.add('hidden');
            }
            toStepDep(1);
        }

        function calcUsdDep() {
            if(currentDepMethod === 'pkr') {
                const pkr = document.getElementById('dAmount').value;
                const usd = (pkr / 280).toFixed(2);
                const disp = document.getElementById('usdConvertDep');
                if(pkr > 0) { disp.innerText = `Approx: $${usd}`; disp.classList.remove('hidden'); } else { disp.classList.add('hidden'); }
            }
        }

        async function submitDep() {
            const amt = document.getElementById('dSent').value, tx = document.getElementById('dTxid').value, name = document.getElementById('dName').value;
            if(!amt || !tx || !name) return alert("Fill all details");
            await db.collection('requests').add({
                uid: auth.currentUser.uid, email: auth.currentUser.email,
                amount: parseFloat(amt), currency: currentDepMethod === 'crypto' ? 'USD' : 'PKR',
                accountName: name, txid: tx, status: 'Pending', time: Date.now(), addedToBalance: false
            });
            alert("Deposit Request Sent!"); hideM('depM');
        }

        // WITHDRAW LOGIC
        function openWit() { showM('witM'); document.getElementById('w0').classList.remove('hidden'); document.getElementById('wC').classList.add('hidden'); document.getElementById('wP').classList.add('hidden'); }
        function selectWitMethod(m) { document.getElementById('w0').classList.add('hidden'); if(m === 'crypto') document.getElementById('wC').classList.remove('hidden'); else document.getElementById('wP').classList.remove('hidden'); }

        async function submitWitCrypto() {
            const amt = parseFloat(document.getElementById('wcAmt').value);
            const wallet = document.getElementById('wcWallet').value;
            if(!amt || !wallet) return alert("Fill all details");
            if(userBalance < amt) return alert("Insufficient Balance");

            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            await db.collection('withdrawals').add({
                uid: auth.currentUser.uid, email: auth.currentUser.email,
                amount: amt, currency: 'USD', bankName: document.getElementById('wcNet').value,
                accountNumber: wallet, status: 'Pending', time: Date.now()
            });
            alert("Withdrawal Request Submitted!"); hideM('witM');
        }

        async function submitWitPkr() {
            const amt = parseFloat(document.getElementById('wAmt').value);
            const pkrToUsd = amt / 280;
            if(!amt || !document.getElementById('wAccNum').value) return alert("Fill all details");
            if(userBalance < pkrToUsd) return alert("Insufficient Balance");

            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-pkrToUsd) });
            await db.collection('withdrawals').add({
                uid: auth.currentUser.uid, email: auth.currentUser.email,
                amount: amt, currency: 'PKR', bankName: document.getElementById('wBank').value,
                accountNumber: document.getElementById('wAccNum').value, accountName: document.getElementById('wAccName').value,
                status: 'Pending', time: Date.now()
            });
            alert("Withdrawal Request Submitted!"); hideM('witM');
        }

        // HISTORY SYSTEM
        async function loadHistory(coll) {
            const list = document.getElementById('historyList');
            list.innerHTML = '<p class="text-center py-10 text-[10px] text-gray-500">LOADING...</p>';
            db.collection(coll).where('uid', '==', auth.currentUser.uid).onSnapshot(snap => {
                let html = '';
                if(snap.empty) { list.innerHTML = '<p class="text-center py-10 text-gray-700 text-[10px]">NO RECORDS FOUND</p>'; return; }
                let docs = [];
                snap.forEach(doc => docs.push(doc.data()));
                docs.sort((a,b) => b.time - a.time);
                docs.forEach(d => {
                    const st = d.status || 'Pending';
                    const isDep = coll === 'requests';
                    html += `
                    <div class="history-card">
                        <div>
                            <p class="text-[10px] font-black text-white uppercase italic">${isDep ? 'Deposit' : 'Withdrawal'}</p>
                            <p class="text-[8px] text-gray-500 font-bold mt-1 uppercase">${isDep ? d.txid : d.bankName}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs font-black ${isDep ? 'text-green-500' : 'text-red-500'} mb-2">${d.currency === 'USD' ? '$' : 'Rs.'} ${d.amount}</p>
                            <span class="status-badge ${st.toLowerCase()}">${st}</span>
                        </div>
                    </div>`;
                });
                list.innerHTML = html;
            });
        }
    </script>
</body>
</html>
