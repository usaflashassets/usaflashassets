<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dubai Live Trade | Member Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        html, body { background: #020408; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; touch-action: manipulation; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .auth-input { background: #0f172a; border: 1px solid #1e293b; padding: 10px; border-radius: 10px; width: 100%; color: white; outline: none; font-size: 16px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        #fancyToast { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; padding: 15px 25px; border-radius: 20px; text-align: center; border: 1px solid; animation: slideDown 0.5s ease forwards; width: 80%; max-width: 300px; }
        @keyframes slideDown { from { top: -100px; opacity: 0; } to { top: 20px; opacity: 1; } }
        .history-card { background: #0a0f1d; border-radius: 12px; padding: 10px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .status-badge { padding: 2px 8px; border-radius: 50px; font-size: 8px; font-weight: 800; text-transform: uppercase; }
        .pending { background: rgba(234, 179, 8, 0.1); color: #eab308; }
        .success { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .failed { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .option-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; margin-bottom: 8px; }
        .btn-small { padding: 12px; border-radius: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        #dashboard { max-width: 450px; margin: 0 auto; }
    </style>
</head>
<body>

    <div id="fancyToast" class="glass">
        <div id="toastIcon" class="text-2xl mb-1"></div>
        <div id="toastMsg" class="text-xs font-black uppercase tracking-widest text-white"></div>
    </div>

    <div id="authSec" class="flex items-center justify-center min-h-screen p-6">
        <div class="glass w-full max-w-xs p-8 rounded-[25px] text-center shadow-2xl">
            <h1 class="text-xl font-black text-white italic uppercase mb-6 tracking-tighter">Dubai Live Trade</h1>
            <input type="email" id="email" placeholder="Email Address" class="auth-input mb-3">
            <input type="password" id="pass" placeholder="Password" class="auth-input mb-5">
            <button onclick="handleAuth('login')" class="w-full py-3 bg-yellow-500 text-black font-black rounded-xl uppercase text-[10px]">Login Account</button>
        </div>
    </div>

    <div id="dashboard" class="hidden p-4">
        <header class="flex justify-between items-center py-4 mb-8">
            <div class="flex items-center gap-3">
                <div onclick="showM('profileM')" class="w-10 h-10 rounded-xl bg-yellow-500 flex items-center justify-center text-xl cursor-pointer shadow-lg shadow-yellow-500/20">👤</div>
                <div>
                    <p class="text-[8px] text-gray-500 font-bold uppercase leading-none mb-1">Total Balance</p>
                    <h2 id="balanceDisp" class="text-xl font-black text-white leading-none tracking-tight">$0.00</h2>
                </div>
            </div>
            <div class="text-right">
                <div class="flex items-center gap-1 justify-end">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                    <p class="text-[9px] font-black text-white uppercase italic opacity-40">Live</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-3 mb-3">
            <button onclick="openDep()" class="btn-small bg-white text-black">Deposit</button>
            <button onclick="openWit()" class="btn-small bg-red-600 text-white">Withdraw</button>
        </div>
        <button onclick="showM('histM')" class="w-full btn-small border border-white/10 bg-white/5 text-gray-400">Transaction History</button>
    </div>

    <div id="histM" class="modal">
        <div class="glass p-5 rounded-[25px] w-full max-w-sm h-[70vh] flex flex-col">
            <h2 class="text-[10px] font-black text-center mb-4 uppercase italic text-gray-400">Activity Logs</h2>
            <div class="flex gap-2 mb-4">
                <button onclick="loadHistory('requests')" class="flex-1 py-2 bg-green-500/10 text-green-500 rounded-lg text-[8px] font-black uppercase">Deposits</button>
                <button onclick="loadHistory('withdrawals')" class="flex-1 py-2 bg-red-500/10 text-red-500 rounded-lg text-[8px] font-black uppercase">Withdraws</button>
            </div>
            <div id="historyList" class="flex-grow overflow-y-auto pr-1 text-[9px]">
                <p class="text-center py-10 opacity-30 font-bold uppercase text-[8px]">Select Category</p>
            </div>
            <button onclick="hideM('histM')" class="w-full mt-4 py-3 border border-white/10 text-[9px] font-bold text-gray-500 uppercase rounded-xl">Back</button>
        </div>
    </div>

    <div id="depM" class="modal">
        <div class="glass p-6 rounded-[25px] w-full max-w-xs">
            <div id="d0" class="space-y-2">
                <h2 class="text-[10px] font-black text-center mb-4 uppercase italic">Select Method</h2>
                <div onclick="selectDepMethod('crypto')" class="option-card text-center"><p class="text-white text-[11px] font-bold">Crypto (BEP20)</p></div>
                <div onclick="selectDepMethod('pkr')" class="option-card text-center"><p class="text-white text-[11px] font-bold">PKR (Local Bank)</p></div>
            </div>
            <div id="d1" class="hidden">
                <input type="number" id="dAmount" oninput="calcUsdDep()" placeholder="Enter Amount" class="auth-input mb-2 text-center">
                <p id="usdConvertDep" class="text-center text-[9px] text-yellow-500 font-bold mb-4 hidden"></p>
                <button onclick="toStepDep(2)" class="w-full btn-small bg-yellow-500 text-black">Next Step</button>
            </div>
            <div id="d2" class="hidden text-center">
                <img id="depQR" src="" class="mx-auto mb-3 rounded-lg w-36 h-36 object-contain bg-white p-2">
                <p id="cryptoAddr" class="text-[8px] text-gray-500 break-all mb-4 px-2 hidden">0x76ecfe8a3bd89297189e16cdcd275d743fb71a62</p>
                <button onclick="toStepDep(3)" class="w-full btn-small bg-yellow-500 text-black">I Have Paid</button>
            </div>
            <div id="d3" class="hidden space-y-3">
                <input type="text" id="dName" placeholder="Account Name" class="auth-input">
                <input type="number" id="dSent" placeholder="Amount Sent" class="auth-input">
                <input type="text" id="dTxid" placeholder="Transaction ID" class="auth-input">
                <button onclick="submitDep()" class="w-full btn-small bg-green-600 text-white">Submit Request</button>
            </div>
            <button onclick="closeModal('depM')" class="w-full mt-4 text-[9px] font-bold text-gray-600 uppercase text-center">Cancel</button>
        </div>
    </div>

    <div id="witM" class="modal">
        <div class="glass p-6 rounded-[25px] w-full max-w-xs">
            <div id="w0" class="space-y-2">
                <h2 class="text-[10px] font-black text-center mb-4 uppercase italic">Withdraw Method</h2>
                <div onclick="selectWitMethod('crypto')" class="option-card text-center"><p class="text-white text-[11px] font-bold">Crypto Wallet</p></div>
                <div onclick="selectWitMethod('pkr')" class="option-card text-center"><p class="text-white text-[11px] font-bold">PKR Bank/JazzCash</p></div>
            </div>
            <div id="wC" class="hidden space-y-3">
                <select id="wcNet" class="auth-input"><option>USDT (BEP20)</option><option>USDT (TRC20)</option></select>
                <input type="text" id="wcWallet" placeholder="Wallet Address" class="auth-input">
                <input type="number" id="wcAmt" placeholder="Amount ($)" class="auth-input">
                <button onclick="submitWitCrypto()" class="w-full btn-small bg-white text-black">Confirm Withdrawal</button>
            </div>
            <div id="wP" class="hidden space-y-3">
                <select id="wBank" class="auth-input"><option>JazzCash</option><option>EasyPaisa</option><option>Bank Transfer</option></select>
                <input type="text" id="wAccNum" placeholder="Account Number" class="auth-input">
                <input type="text" id="wAccName" placeholder="Account Name" class="auth-input">
                <input type="number" id="wAmt" placeholder="Amount (PKR)" class="auth-input">
                <button onclick="submitWitPkr()" class="w-full btn-small bg-white text-black">Confirm Withdrawal</button>
            </div>
            <button onclick="closeModal('witM')" class="w-full mt-4 text-[9px] font-bold text-gray-600 uppercase text-center">Cancel</button>
        </div>
    </div>

    <div id="profileM" class="modal">
        <div class="glass p-6 rounded-[25px] w-full max-w-xs text-center">
            <p id="uEmail" class="text-white font-bold text-[10px] mb-4 opacity-70"></p>
            <button onclick="auth.signOut().then(()=>location.reload())" class="w-full py-3 bg-red-600/10 text-red-600 rounded-xl font-black uppercase text-[9px]">Logout</button>
            <button onclick="hideM('profileM')" class="mt-4 text-[9px] text-gray-600 font-bold uppercase">Close</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let currentDepMethod = '', userBalance = 0;

        function showToast(msg, icon, color) { 
            const t = document.getElementById('fancyToast'); 
            document.getElementById('toastMsg').innerText = msg; 
            document.getElementById('toastIcon').innerText = icon; 
            t.style.borderColor = color; 
            t.style.display = 'block'; 
            setTimeout(() => t.style.display = 'none', 3500); 
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('authSec').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('uEmail').innerText = user.email;
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    if(doc.exists) { userBalance = doc.data().balance || 0; document.getElementById('balanceDisp').innerText = "$" + userBalance.toFixed(2); }
                });
            } else {
                document.getElementById('authSec').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
            }
        });

        async function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(!e || !p) return showToast("Fill Details", "⚠️", "#eab308");
            try {
                await auth.signInWithEmailAndPassword(e, p);
                showToast("Logged In", "👤", "#22c55e");
            } catch(err) { showToast(err.message, "❌", "#ef4444"); }
        }

        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; }
        function closeModal(id) { const modal = document.getElementById(id); modal.querySelectorAll('input').forEach(i => i.value = ''); hideM(id); }

        function openDep() { showM('depM'); toStepDep(0); }
        function toStepDep(s) { 
            if(s === 2) {
                const amt = parseFloat(document.getElementById('dAmount').value);
                if(currentDepMethod === 'pkr' && (isNaN(amt) || amt < 2800)) return showToast("Min 2800 PKR", "⚠️", "#ef4444");
                if(currentDepMethod === 'crypto' && (isNaN(amt) || amt < 10)) return showToast("Min $10 USD", "⚠️", "#ef4444");
            }
            ['d0','d1','d2','d3'].forEach(d => document.getElementById(d).classList.add('hidden')); 
            document.getElementById('d'+s).classList.remove('hidden'); 
        }

        function selectDepMethod(m) {
            currentDepMethod = m;
            document.getElementById('depQR').src = m === 'crypto' ? "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=0x76ecfe8a3bd89297189e16cdcd275d743fb71a62" : "https://i.postimg.cc/HLPQpW92/Screenshot-20260504-033311.jpg";
            m === 'crypto' ? document.getElementById('cryptoAddr').classList.remove('hidden') : document.getElementById('cryptoAddr').classList.add('hidden');
            document.getElementById('dAmount').placeholder = m === 'crypto' ? "Amount (USD)" : "Amount (PKR)";
            toStepDep(1);
        }

        function calcUsdDep() {
            if(currentDepMethod === 'pkr') {
                const usd = (document.getElementById('dAmount').value / 280).toFixed(2);
                const disp = document.getElementById('usdConvertDep');
                if(usd > 0) { disp.innerText = `Approx: $${usd}`; disp.classList.remove('hidden'); } else { disp.classList.add('hidden'); }
            }
        }

        async function submitDep() {
            const amt = parseFloat(document.getElementById('dSent').value), tx = document.getElementById('dTxid').value;
            if(!amt || !tx) return showToast("Fill Details", "⚠️", "#ef4444");
            if(currentDepMethod === 'pkr' && amt < 2800) return showToast("Min 2800 PKR", "⚠️", "#ef4444");
            if(currentDepMethod === 'crypto' && amt < 10) return showToast("Min $10 USD", "⚠️", "#ef4444");
            await db.collection('requests').add({ uid: auth.currentUser.uid, email: auth.currentUser.email, amount: amt, currency: currentDepMethod==='crypto'?'USD':'PKR', txid: tx, status: 'Pending', time: Date.now() });
            closeModal('depM'); 
            showToast("Deposit Submitted!", "🚀", "#22c55e");
        }

        function openWit() { showM('witM'); document.getElementById('w0').classList.remove('hidden'); document.getElementById('wC').classList.add('hidden'); document.getElementById('wP').classList.add('hidden'); }
        function selectWitMethod(m) { document.getElementById('w0').classList.add('hidden'); if(m === 'crypto') document.getElementById('wC').classList.remove('hidden'); else document.getElementById('wP').classList.remove('hidden'); }

        async function submitWitCrypto() {
            const amt = parseFloat(document.getElementById('wcAmt').value);
            if(!amt || amt < 10) return showToast("Min $10 USD", "⚠️", "#ef4444");
            if(userBalance < amt) return showToast("Low Balance", "❌", "#ef4444");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            await db.collection('withdrawals').add({ uid: auth.currentUser.uid, email: auth.currentUser.email, amount: amt, currency: 'USD', status: 'Pending', time: Date.now(), bankName: document.getElementById('wcNet').value, accountNumber: document.getElementById('wcWallet').value });
            closeModal('witM'); 
            showToast("Withdrawal Pending", "⏳", "#eab308");
        }

        async function submitWitPkr() {
            const amt = parseFloat(document.getElementById('wAmt').value);
            if(!amt || amt < 2800) return showToast("Min 2800 PKR", "⚠️", "#ef4444");
            const usd = amt / 280;
            if(userBalance < usd) return showToast("Low Balance", "❌", "#ef4444");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-usd) });
            await db.collection('withdrawals').add({ uid: auth.currentUser.uid, email: auth.currentUser.email, amount: amt, currency: 'PKR', status: 'Pending', time: Date.now(), bankName: document.getElementById('wBank').value, accountNumber: document.getElementById('wAccNum').value, accountName: document.getElementById('wAccName').value });
            closeModal('witM'); 
            showToast("Withdrawal Pending", "⏳", "#eab308");
        }

        async function loadHistory(coll) {
            const list = document.getElementById('historyList');
            list.innerHTML = '<p class="text-center py-10 opacity-30 uppercase text-[8px]">Syncing...</p>';
            db.collection(coll).where('uid', '==', auth.currentUser.uid).onSnapshot(snap => {
                let html = '';
                let items = [];
                snap.forEach(doc => items.push(doc.data()));
                items.sort((a,b) => b.time - a.time);
                items.forEach(d => {
                    const st = d.status || 'Pending';
                    const icon = coll === 'requests' ? '📥' : '📤';
                    html += `<div class="history-card">
                        <div class="flex items-center gap-2">
                            <span class="opacity-50">${icon}</span>
                            <div><p class="font-black text-white uppercase text-[9px]">${coll==='requests'?'Dep':'Wit'}</p><p class="text-[7px] text-gray-500 uppercase">${d.currency}</p></div>
                        </div>
                        <div class="text-right"><p class="font-black text-[10px] ${coll==='requests'?'text-green-500':'text-red-500'}">${d.currency==='USD'?'$':'Rs'}${d.amount}</p><span class="status-badge ${st.toLowerCase()}">${st}</span></div>
                    </div>`;
                });
                list.innerHTML = html || '<p class="text-center py-10 text-[8px] opacity-20">EMPTY HISTORY</p>';
            });
        }
    </script>
</body>
</html>
