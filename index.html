<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Hub | ProTrade Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .auth-input { background: #0f172a; border: 1px solid #1e293b; padding: 16px; border-radius: 16px; width: 100%; color: white; outline: none; transition: 0.3s; }
        .auth-input:focus { border-color: #eab308; box-shadow: 0 0 15px rgba(234, 179, 8, 0.1); }
        .action-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .action-btn:active { transform: scale(0.95); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .step-circle { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; border: 2px solid #2d3748; color: #2d3748; }
        .step-active { border-color: #eab308; color: #eab308; background: rgba(234, 179, 8, 0.1); }
        .history-card { background: linear-gradient(145deg, #0f172a 0%, #05070a 100%); border: 1px solid rgba(255,255,255,0.03); border-radius: 24px; padding: 20px; margin-bottom: 12px; }
        .status-pill { padding: 4px 12px; border-radius: 50px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .pending { background: rgba(234, 179, 8, 0.1); color: #eab308; border: 1px solid rgba(234, 179, 8, 0.2); }
        .success { background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.2); }
        .failed { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>

    <div id="authSection" class="flex items-center justify-center min-h-screen p-6">
        <div class="glass-card w-full max-w-sm p-10 rounded-[40px] shadow-2xl">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-black text-white italic tracking-tighter uppercase">Member Portal</h1>
                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.2em] mt-2">Professional Finance Management</p>
            </div>
            <input type="email" id="email" placeholder="Account Email" class="auth-input mb-4">
            <input type="password" id="pass" placeholder="Password" class="auth-input mb-8">
            <button onclick="login()" class="action-btn w-full py-5 bg-yellow-500 text-black font-black rounded-2xl uppercase shadow-lg shadow-yellow-500/20">Sign In Now</button>
        </div>
    </div>

    <div id="dashboard" class="hidden p-6 max-w-md mx-auto">
        <header class="flex justify-between items-center py-8">
            <div>
                <h2 id="balanceDisp" class="text-4xl font-black text-white tracking-tighter">$0.00</h2>
                <p id="userEmailDisp" class="text-[10px] text-yellow-500 font-extrabold uppercase mt-1 opacity-80 italic"></p>
            </div>
            <button onclick="auth.signOut()" class="bg-white/5 border border-white/10 w-12 h-12 rounded-2xl flex items-center justify-center text-xl">✕</button>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-10">
            <button onclick="openM('depM')" class="action-btn py-5 bg-white text-black rounded-[24px] font-black uppercase text-[11px] tracking-widest shadow-xl">Deposit</button>
            <button onclick="openM('witM')" class="action-btn py-5 bg-[#1e293b] text-white rounded-[24px] font-black uppercase text-[11px] tracking-widest border border-white/5 shadow-xl">Withdraw</button>
        </div>

        <div class="flex justify-between items-end mb-6">
            <h3 class="text-[12px] font-black text-white uppercase tracking-widest italic">Ledger History</h3>
            <div class="flex gap-4">
                <button onclick="loadHistory('requests')" class="text-[10px] font-bold text-gray-500 hover:text-white transition uppercase">Deposits</button>
                <button onclick="loadHistory('withdrawals')" class="text-[10px] font-bold text-gray-500 hover:text-white transition uppercase">Withdrawals</button>
            </div>
        </div>
        
        <div id="historyList" class="space-y-4"></div>
    </div>

    <div id="depM" class="modal">
        <div class="glass-card p-8 rounded-[40px] w-full max-w-sm">
            <div class="flex justify-center gap-4 mb-8">
                <div id="s1c" class="step-circle step-active">1</div>
                <div id="s2c" class="step-circle">2</div>
                <div id="s3c" class="step-circle">3</div>
            </div>

            <div id="step1">
                <h2 class="text-xl font-black text-white mb-2 uppercase text-center italic">Amount</h2>
                <p class="text-[10px] text-gray-500 text-center mb-8 font-bold uppercase">Enter deposit amount in PKR</p>
                <input type="number" id="dAmount" placeholder="0.00 PKR" class="auth-input mb-6 text-center text-xl font-black">
                <button onclick="toStep(2)" class="action-btn w-full py-5 bg-yellow-500 text-black font-black rounded-2xl uppercase">Next Step</button>
            </div>

            <div id="step2" class="hidden text-center">
                <h2 class="text-xl font-black text-white mb-6 uppercase italic">Scan QR Code</h2>
                <div class="w-48 h-48 bg-white rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-2xl overflow-hidden border-4 border-yellow-500/20">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=ProTradePayment" alt="QR" class="w-full h-full opacity-80">
                </div>
                <p class="text-[10px] text-gray-500 mb-8 font-bold uppercase px-4">Scan and pay the exact amount entered in Step 1</p>
                <button onclick="toStep(3)" class="action-btn w-full py-5 bg-yellow-500 text-black font-black rounded-2xl uppercase italic">I Have Paid</button>
            </div>

            <div id="step3" class="hidden">
                <h2 class="text-xl font-black text-white mb-2 uppercase text-center italic">Verify</h2>
                <p class="text-[10px] text-gray-500 text-center mb-8 font-bold uppercase">Enter your Transaction details</p>
                <input type="text" id="dName" placeholder="Account Name" class="auth-input mb-3">
                <input type="text" id="dTxid" placeholder="Transaction ID (TXID)" class="auth-input mb-8">
                <button onclick="submitDeposit()" class="action-btn w-full py-5 bg-green-500 text-black font-black rounded-2xl uppercase">Submit for Review</button>
            </div>
            <button onclick="closeM('depM')" class="w-full mt-4 text-[10px] font-bold text-gray-600 uppercase tracking-widest">Cancel Transaction</button>
        </div>
    </div>

    <div id="witM" class="modal">
        <div class="glass-card p-8 rounded-[40px] w-full max-w-sm">
            <h2 class="text-xl font-black text-white mb-2 uppercase text-center italic">Withdrawal</h2>
            <p class="text-[10px] text-gray-500 text-center mb-8 font-bold uppercase tracking-widest">Request your funds</p>
            <div class="space-y-3 mb-8">
                <input type="text" id="wBank" placeholder="Method (JazzCash/EasyPaisa)" class="auth-input">
                <input type="text" id="wAcc" placeholder="Account Number" class="auth-input">
                <input type="number" id="wAmount" placeholder="Amount in PKR" class="auth-input">
            </div>
            <button onclick="submitWithdraw()" class="action-btn w-full py-5 bg-white text-black font-black rounded-2xl uppercase italic shadow-xl">Submit Request</button>
            <button onclick="closeM('witM')" class="w-full mt-4 text-[10px] font-bold text-gray-600 uppercase tracking-widest">Return to Dashboard</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", 
            authDomain: "waqas-47f30.firebaseapp.com", 
            projectId: "waqas-47f30", 
            storageBucket: "waqas-47f30.appspot.com", 
            messagingSenderId: "374104279093", 
            appId: "1:374104279093:web:6e1844b60456c700940364" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('userEmailDisp').innerText = user.email;
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    if(doc.exists) document.getElementById('balanceDisp').innerText = "$" + (doc.data().balance || 0).toFixed(2);
                });
                loadHistory('requests');
            } else {
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
            }
        });

        async function login() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert("Access Denied: " + err.message); }
        }

        function openM(id) { document.getElementById(id).style.display = 'flex'; if(id==='depM') toStep(1); }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }

        function toStep(s) {
            [1,2,3].forEach(n => {
                document.getElementById('step'+n).classList.add('hidden');
                document.getElementById('s'+n+'c').classList.remove('step-active');
            });
            document.getElementById('step'+s).classList.remove('hidden');
            document.getElementById('s'+s+'c').classList.add('step-active');
        }

        async function submitDeposit() {
            const amt = document.getElementById('dAmount').value, tx = document.getElementById('dTxid').value, name = document.getElementById('dName').value;
            if(!amt || !tx || !name) return alert("All fields are required");
            await db.collection('requests').add({
                uid: auth.currentUser.uid,
                email: auth.currentUser.email,
                amount: amt,
                accountName: name,
                txid: tx,
                status: 'Pending',
                time: Date.now()
            });
            alert("Payment recorded. Our team will verify it shortly."); closeM('depM'); loadHistory('requests');
        }

        async function submitWithdraw() {
            const amt = document.getElementById('wAmount').value, bank = document.getElementById('wBank').value, acc = document.getElementById('wAcc').value;
            if(!amt || !bank || !acc) return alert("Invalid details");
            await db.collection('withdrawals').add({
                uid: auth.currentUser.uid,
                email: auth.currentUser.email,
                amount: amt,
                bankName: bank,
                accountNumber: acc,
                status: 'Pending',
                time: Date.now()
            });
            alert("Withdrawal request sent."); closeM('witM'); loadHistory('withdrawals');
        }

        async function loadHistory(coll) {
            const list = document.getElementById('historyList');
            list.innerHTML = '<div class="h-40 flex items-center justify-center"><div class="w-6 h-6 border-2 border-yellow-500 border-t-transparent rounded-full animate-spin"></div></div>';
            
            const snap = await db.collection(coll).where('uid', '==', auth.currentUser.uid).orderBy('time', 'desc').limit(15).get();
            if(snap.empty) { list.innerHTML = '<p class="text-center py-20 text-gray-700 text-[10px] font-black uppercase tracking-widest">No Records Found</p>'; return; }
            
            let html = '';
            snap.forEach(doc => {
                const d = doc.data();
                const st = d.status || 'Pending';
                html += `
                <div class="history-card shadow-2xl">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-xs font-black">
                            ${coll === 'requests' ? '📥' : '📤'}
                        </div>
                        <div>
                            <p class="text-[10px] font-black text-white uppercase italic tracking-tighter">${coll === 'requests' ? 'Security Deposit' : 'Cash Withdrawal'}</p>
                            <p class="text-[9px] text-gray-600 font-bold mt-1 uppercase">${coll === 'requests' ? 'TXID: '+d.txid : d.bankName}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-black text-white mb-2">PKR ${d.amount}</p>
                        <span class="status-pill ${st.toLowerCase()}">${st}</span>
                    </div>
                </div>`;
            });
            list.innerHTML = html;
        }
    </script>
</body>
</html>
