<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Portal | History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Card Styles */
        .history-card { 
            background: #111827; 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 15px; 
            border: 1px solid rgba(255,255,255,0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        .btn-deposit { background: #22c55e; color: white; }
        .btn-withdraw { background: #ef4444; color: white; }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }
        .pending { background: rgba(234, 179, 8, 0.1); color: #eab308; }
        .success { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .failed { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; }
    </style>
</head>
<body>

    <div id="authSection" class="flex items-center justify-center min-h-screen p-4">
        <div class="glass-card w-full max-w-sm p-8 rounded-[32px]">
            <h1 class="text-2xl font-black text-center mb-6 uppercase italic text-yellow-500 tracking-tighter">Member Access</h1>
            <input type="email" id="email" placeholder="Email" class="auth-input mb-4">
            <input type="password" id="pass" placeholder="Password" class="auth-input mb-6">
            <button onclick="login()" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase">Login to Dashboard</button>
        </div>
    </div>

    <div id="dashboard" class="hidden p-4 max-w-md mx-auto">
        <div class="flex justify-between items-center py-6">
            <div>
                <p class="text-[10px] text-gray-500 font-extrabold uppercase tracking-widest">Available Balance</p>
                <h2 id="balanceDisp" class="text-3xl font-black text-white">$0.00</h2>
            </div>
            <button onclick="auth.signOut()" class="text-[10px] font-bold text-gray-500 border border-white/10 px-3 py-1 rounded-lg">LOGOUT</button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-8">
            <button onclick="loadData('deposits')" id="depBtn" class="py-4 rounded-2xl font-black uppercase text-xs btn-deposit shadow-lg shadow-green-500/20">Deposits</button>
            <button onclick="loadData('withdraws')" id="witBtn" class="py-4 rounded-2xl font-black uppercase text-xs btn-withdraw shadow-lg shadow-red-500/20">Withdrawals</button>
        </div>

        <h3 id="listTitle" class="text-[11px] font-black text-gray-500 uppercase mb-4 tracking-widest">Transaction History</h3>
        
        <div id="contentList">
            </div>
    </div>

    <script>
        // Your Firebase Config
        const firebaseConfig = { 
            apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", 
            authDomain: "waqas-47f30.firebaseapp.com", 
            projectId: "waqas-47f30", 
            storageBucket: "waqas-47f30.appspot.com", 
            messagingSenderId: "374104279093", 
            appId: "1:374104279093:web:6e1844b60456c700940364" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                
                // Balance update
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    if(doc.exists) document.getElementById('balanceDisp').innerText = "$" + (doc.data().balance || 0).toFixed(2);
                });
                loadData('deposits'); // Default view
            } else {
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
            }
        });

        async function login() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert(err.message); }
        }

        async function loadData(type) {
            const list = document.getElementById('contentList');
            const title = document.getElementById('listTitle');
            list.innerHTML = '<p class="text-center py-10 text-gray-600 text-xs">Syncing data...</p>';
            
            title.innerText = type === 'deposits' ? "Deposit History" : "Withdrawal History";
            const collection = type === 'deposits' ? 'requests' : 'withdrawals';
            const uid = auth.currentUser.uid;

            try {
                const snap = await db.collection(collection).where('uid', '==', uid).get();
                if(snap.empty) {
                    list.innerHTML = `<p class="text-center py-10 text-gray-700 italic text-sm">No ${type} found.</p>`;
                    return;
                }

                let html = '';
                snap.forEach(doc => {
                    const data = doc.data();
                    const status = data.status || 'Pending'; // Default is pending
                    const statusClass = status.toLowerCase();
                    
                    html += `
                    <div class="history-card">
                        <div>
                            <p class="text-xs font-black text-white uppercase tracking-tight">${type === 'deposits' ? 'Deposit' : 'Withdraw'}</p>
                            <p class="text-[10px] text-gray-500 font-bold mt-1 uppercase">${type === 'deposits' ? (data.txid || 'TXID: N/A') : data.bankName}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black text-white mb-2">Rs. ${data.amount}</p>
                            <span class="status-badge ${statusClass}">${status}</span>
                        </div>
                    </div>`;
                });
                list.innerHTML = html;
            } catch (e) {
                list.innerHTML = `<p class="text-center text-red-500 text-xs py-10">Data indexing required. Check console.</p>`;
            }
        }
    </script>
</body>
</html>
