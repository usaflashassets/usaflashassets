<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade | Affiliate Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; min-height: 100vh; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .stat-box { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 15px; text-align: center; }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; }
        .list-item { background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.05); padding: 12px; display: flex; justify-content: space-between; font-size: 11px; }
        #loader { position: fixed; inset: 0; background: #05070a; z-index: 9999; display: flex; items-center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="w-8 h-8 border-2 border-yellow-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div id="authBox" class="min-h-screen flex items-center justify-center p-4 hidden">
        <div class="glass-card w-full max-w-sm p-8 rounded-[32px] text-center">
            <h1 class="text-3xl font-black mb-2 uppercase italic">Partner</h1>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-[4px] mb-8 text-yellow-500">Dubai Live Trade</p>
            <input type="email" id="email" placeholder="Email" class="auth-input mb-4">
            <input type="password" id="pass" placeholder="Password" class="auth-input mb-6">
            <button onclick="authAction('login')" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase mb-3 text-sm">Login Account</button>
            <button onclick="authAction('reg')" class="w-full py-4 border border-white/10 text-white font-black rounded-2xl uppercase text-[10px]">Create Partner Account</button>
        </div>
    </div>

    <div id="dashBox" class="hidden p-5 max-w-lg mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h2 class="font-black italic uppercase text-lg">ProTrade <span class="text-yellow-500">Affiliate</span></h2>
            <button onclick="auth.signOut().then(()=>location.reload())" class="text-[10px] font-bold text-red-500 uppercase border border-red-500/20 px-3 py-1 rounded-lg">Logout</button>
        </header>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="stat-box"><p class="text-[8px] text-gray-500 font-bold uppercase">Total Clicks</p><h3 id="c_clicks" class="text-xl font-black italic">0</h3></div>
            <div class="stat-box"><p class="text-[8px] text-gray-500 font-bold uppercase">Registered</p><h3 id="c_users" class="text-xl font-black italic">0</h3></div>
            <div class="stat-box border-yellow-500/20"><p class="text-[8px] text-yellow-500 font-bold uppercase">Commission (40%)</p><h3 id="c_comm" class="text-xl font-black text-yellow-500 italic">$0.00</h3></div>
            <div class="stat-box"><p class="text-[8px] text-gray-500 font-bold uppercase">Total Sales</p><h3 id="c_dep" class="text-xl font-black italic">$0.00</h3></div>
        </div>

        <div class="glass-card p-6 rounded-[30px] border-yellow-500/10 mb-6">
            <h3 class="text-center font-black text-[10px] uppercase mb-4 tracking-widest text-gray-400">Your Affiliate Link</h3>
            <div class="bg-black/60 p-4 rounded-xl border border-white/5 mb-4">
                <p id="finalLink" class="text-yellow-500 font-bold text-[12px] break-all text-center italic">Generating link...</p>
            </div>
            <button onclick="copyLink()" class="w-full py-4 bg-white text-black font-black rounded-2xl uppercase text-xs shadow-xl active:scale-95 transition-transform">Copy My Link</button>
        </div>

        <div class="glass-card rounded-[30px] overflow-hidden">
            <div class="p-4 border-b border-white/5 bg-white/5">
                <h3 class="font-black text-[10px] uppercase tracking-widest">Recent Activity</h3>
            </div>
            <div id="depList" class="min-h-[100px]">
                <p class="text-center text-gray-600 text-[10px] py-10">No referral data yet</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        auth.onAuthStateChanged(user => {
            document.getElementById('loader').style.display = 'none';
            if(user) { loadDash(user); } 
            else { document.getElementById('authBox').classList.remove('hidden'); }
        });

        async function authAction(type) {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(!e || !p) return alert("Please fill all fields");
            try {
                if(type === 'reg') {
                    const res = await auth.createUserWithEmailAndPassword(e, p);
                    // 5 Digit Unique ID for link
                    const sID = Math.random().toString(36).substring(2, 7).toUpperCase();
                    await db.collection('affiliates').doc(res.user.uid).set({
                        email: e, clicks: 0, totalUsers: 0, totalCommission: 0, totalDepositsUSD: 0, refID: sID
                    });
                } else { await auth.signInWithEmailAndPassword(e, p); }
            } catch(err) { alert(err.message); }
        }

        function loadDash(user) {
            document.getElementById('authBox').classList.add('hidden');
            document.getElementById('dashBox').classList.remove('hidden');

            db.collection('affiliates').doc(user.uid).onSnapshot(doc => {
                const d = doc.data();
                if(d) {
                    document.getElementById('c_clicks').innerText = d.clicks || 0;
                    document.getElementById('c_users').innerText = d.totalUsers || 0;
                    document.getElementById('c_comm').innerText = "$" + (d.totalCommission || 0).toFixed(2);
                    document.getElementById('c_dep').innerText = "$" + (d.totalDepositsUSD || 0).toFixed(2);
                    // Fixed Link Logic
                    document.getElementById('finalLink').innerText = "https://dubailivetrade.online/?ref=" + d.refID;
                }
            });

            // Commission List Logic
            db.collection('affiliate_history').where('partnerUid', '==', user.uid).orderBy('time', 'desc').onSnapshot(snap => {
                const list = document.getElementById('depList');
                if(snap.empty) return;
                list.innerHTML = "";
                snap.forEach(doc => {
                    const h = doc.data();
                    list.innerHTML += `
                        <div class="list-item">
                            <div>
                                <p class="text-white font-bold">${h.userEmail.split('@')[0]}...</p>
                                <p class="text-gray-500 font-bold uppercase" style="font-size:7px">Deposit: $${h.amount}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-yellow-500 font-bold">+$${h.commission.toFixed(2)}</p>
                                <p class="text-gray-600 text-[8px] uppercase font-bold">${new Date(h.time).toLocaleDateString()}</p>
                            </div>
                        </div>`;
                });
            });
        }

        function copyLink() {
            const link = document.getElementById('finalLink').innerText;
            if(link.includes("Generating")) return;
            navigator.clipboard.writeText(link).then(() => alert("Link Copied Successfully!"));
        }
    </script>
</body>
</html>
