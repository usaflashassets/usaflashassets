<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | Dubai Live Trade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#05070a] text-white p-4 font-sans min-h-screen">
    
    <div id="authBox" class="max-w-sm mx-auto mt-10 bg-[#111827] p-8 rounded-[32px] border border-white/5 shadow-2xl">
        <h1 id="authTitle" class="text-2xl font-black text-center mb-6 text-yellow-500 italic uppercase">Partner Login</h1>
        
        <div class="space-y-4">
            <input type="email" id="affEmail" placeholder="Email" class="w-full p-4 bg-gray-900 rounded-xl border border-gray-800 outline-none text-sm focus:border-yellow-500">
            <input type="password" id="affPass" placeholder="Password" class="w-full p-4 bg-gray-900 rounded-xl border border-gray-800 outline-none text-sm focus:border-yellow-500">
            
            <button onclick="handleAffAuth()" id="authBtn" class="w-full py-4 bg-yellow-500 text-black font-black rounded-xl hover:scale-[1.02] active:scale-[0.98] transition-all">SIGN IN</button>
            
            <p id="toggleText" class="text-center mt-6 text-[10px] text-gray-400 uppercase font-bold cursor-pointer hover:text-yellow-500" onclick="toggleAuth()">
                New Partner? Create Program Account
            </p>
        </div>
    </div>

    <div id="dashBox" class="hidden max-w-lg mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-xl font-black italic text-yellow-500">PARTNER PANEL</h2>
                <p id="partnerEmail" class="text-[10px] text-gray-500 font-bold"></p>
            </div>
            <button onclick="auth.signOut().then(()=>location.reload())" class="text-[10px] bg-red-500/10 text-red-500 px-4 py-2 rounded-xl font-black border border-red-500/20 uppercase">Logout</button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-gray-900 p-5 rounded-2xl border border-white/5 text-center">
                <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Clicks</p>
                <h2 id="c_clicks" class="text-2xl font-black">0</h2>
            </div>
            <div class="bg-gray-900 p-5 rounded-2xl border border-white/5 text-center">
                <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Total Registers</p>
                <h2 id="c_users" class="text-2xl font-black">0</h2>
            </div>
        </div>

        <div class="bg-gradient-to-br from-yellow-500 to-yellow-600 text-black p-8 rounded-[35px] mb-8 shadow-xl shadow-yellow-500/10 relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-[10px] font-black uppercase opacity-70">Total Commission (40%)</p>
                <h1 id="c_comm" class="text-5xl font-black mt-1">$0.00</h1>
            </div>
            <div class="absolute right-[-20px] bottom-[-20px] text-black/10 text-8xl font-black italic">$$</div>
        </div>

        <div class="bg-gray-900 p-6 rounded-[30px] border border-white/5 mb-8 text-center">
            <p class="text-[10px] text-gray-500 font-bold uppercase mb-4 tracking-widest">Your Promotion Link</p>
            <div class="bg-black/40 p-4 rounded-2xl border border-white/5 mb-4 break-all">
                <p id="refLink" class="text-[11px] text-yellow-500 font-bold italic">Generating your link...</p>
            </div>
            <button onclick="copyRef()" class="w-full py-4 bg-white text-black font-black rounded-2xl text-[10px] uppercase tracking-[2px] shadow-lg">Copy Link</button>
        </div>

        <div class="bg-gray-900 rounded-[30px] border border-white/5 overflow-hidden">
            <div class="p-5 border-b border-white/5 bg-white/5">
                <h3 class="text-[10px] font-black uppercase tracking-widest">Recent Conversions</h3>
            </div>
            <div id="historyList" class="p-2 min-h-[120px]">
                <p class="text-center text-gray-600 text-[10px] py-10 font-bold uppercase">No conversions yet</p>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        let authMode = 'login';

        function toggleAuth() {
            authMode = (authMode === 'login') ? 'reg' : 'login';
            document.getElementById('authTitle').innerText = (authMode === 'reg') ? 'JOIN PARTNER PROGRAM' : 'PARTNER LOGIN';
            document.getElementById('authBtn').innerText = (authMode === 'reg') ? 'REGISTER AS PARTNER' : 'SIGN IN';
            document.getElementById('toggleText').innerText = (authMode === 'reg') ? 'Already a Partner? Login' : 'New Partner? Create Program Account';
        }

        async function handleAffAuth() {
            const email = document.getElementById('affEmail').value;
            const pass = document.getElementById('affPass').value;
            const btn = document.getElementById('authBtn');

            if(!email || !pass) return alert("Please fill all fields");
            
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                if(authMode === 'reg') {
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    const randomID = "DT" + Math.floor(1000 + Math.random() * 9000); // Unique 4 digit ID
                    
                    await db.collection('affiliates').doc(res.user.uid).set({
                        email: email,
                        refID: randomID,
                        clicks: 0,
                        totalUsers: 0,
                        totalCommission: 0,
                        totalDepositsUSD: 0,
                        time: Date.now()
                    });
                    alert("Partner Account Created!");
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
            } catch(err) {
                alert(err.message);
                btn.innerText = (authMode === 'reg') ? 'REGISTER' : 'SIGN IN';
                btn.disabled = false;
            }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('authBox').classList.add('hidden');
                document.getElementById('dashBox').classList.remove('hidden');
                document.getElementById('partnerEmail').innerText = user.email;
                
                // Dashboard Updates
                db.collection('affiliates').doc(user.uid).onSnapshot(doc => {
                    const data = doc.data();
                    if(data) {
                        document.getElementById('c_clicks').innerText = data.clicks || 0;
                        document.getElementById('c_users').innerText = data.totalUsers || 0;
                        document.getElementById('c_comm').innerText = "$" + (data.totalCommission || 0).toFixed(2);
                        
                        // Link generation fixed
                        const mainDomain = "https://dubailivetrade.online";
                        document.getElementById('refLink').innerText = `${mainDomain}/go.html?ref=${data.refID}`;
                    }
                });

                // History Updates
                db.collection('affiliate_history').where('partnerUid','==',user.uid).orderBy('time','desc').onSnapshot(snap => {
                    const list = document.getElementById('historyList');
                    if(snap.empty) return;
                    list.innerHTML = "";
                    snap.forEach(doc => {
                        const h = doc.data();
                        list.innerHTML += `
                            <div class="flex justify-between items-center p-4 border-b border-white/5 last:border-0">
                                <div>
                                    <p class="text-[10px] font-black text-white uppercase">${h.userEmail.split('@')[0]}***</p>
                                    <p class="text-[8px] text-gray-500 font-bold uppercase">Conversion</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[11px] font-black text-green-500">+$${h.commission.toFixed(2)}</p>
                                    <p class="text-[8px] text-gray-600 font-bold uppercase">40% Share</p>
                                </div>
                            </div>`;
                    });
                });
            }
        });

        function copyRef() {
            const link = document.getElementById('refLink').innerText;
            if(link.includes("Generating")) return alert("Please wait...");
            navigator.clipboard.writeText(link);
            alert("Referral Link Copied to Clipboard!");
        }
    </script>
</body>
</html>
