<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dubai Live Trade | Member Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020408; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .auth-input { background: #0f172a; border: 1px solid #1e293b; padding: 12px; border-radius: 12px; width: 100%; color: white; outline: none; font-size: 12px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        .history-card { background: #0a0f1d; border-radius: 15px; padding: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .status-badge { padding: 3px 10px; border-radius: 50px; font-size: 8px; font-weight: 800; text-transform: uppercase; }
        .pending { background: rgba(234, 179, 8, 0.1); color: #eab308; }
        .success { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .failed { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .option-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .btn-small { padding: 10px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; transition: 0.2s; }
        .btn-small:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="authSec" class="flex items-center justify-center min-h-screen p-6">
        <div class="glass w-full max-w-sm p-8 rounded-[30px] text-center shadow-2xl">
            <h1 class="text-2xl font-black text-white italic uppercase mb-8">Dubai Live Trade</h1>
            <input type="email" id="email" placeholder="Email" class="auth-input mb-3">
            <input type="password" id="pass" placeholder="Password" class="auth-input mb-6">
            <button onclick="login()" class="w-full py-3 bg-yellow-500 text-black font-black rounded-xl uppercase text-[10px]">Login</button>
        </div>
    </div>

    <div id="dashboard" class="hidden p-4 max-w-md mx-auto">
        <header class="flex justify-between items-center py-4 mb-10">
            <div class="flex items-center gap-3">
                <div onclick="showM('profileM')" class="w-9 h-9 rounded-xl bg-yellow-500 flex items-center justify-center text-lg cursor-pointer shadow-lg shadow-yellow-500/20">👤</div>
                <div>
                    <p class="text-[8px] text-gray-500 font-bold uppercase leading-none mb-1">Balance</p>
                    <h2 id="balanceDisp" class="text-xl font-black text-white leading-none">$0.00</h2>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-black text-white italic tracking-tighter uppercase opacity-50">Live Terminal</p>
            </div>
        </header>

        <div class="space-y-3">
            <div class="grid grid-cols-2 gap-3">
                <button onclick="openDep()" class="btn-small bg-white text-black">Deposit</button>
                <button onclick="openWit()" class="btn-small bg-red-600 text-white">Withdraw</button>
            </div>
            <button onclick="showM('histM')" class="w-full btn-small border border-white/10 bg-white/5 text-gray-400">Transaction History</button>
        </div>
    </div>

    <div id="histM" class="modal">
        <div class="glass p-6 rounded-[30px] w-full max-w-md h-[75vh] flex flex-col">
            <h2 class="text-xs font-black text-center mb-4 uppercase italic tracking-widest">Activity Logs</h2>
            <div class="flex gap-2 mb-4">
                <button onclick="loadHistory('requests')" class="flex-1 py-2 bg-green-500/10 text-green-500 rounded-lg text-[9px] font-black uppercase">Deposits</button>
                <button onclick="loadHistory('withdrawals')" class="flex-1 py-2 bg-red-500/10 text-red-500 rounded-lg text-[9px] font-black uppercase">Withdraws</button>
            </div>
            <div id="historyList" class="flex-grow overflow-y-auto pr-1 text-[10px]">
                <p class="text-center py-10 text-gray-600 uppercase font-bold">Select category</p>
            </div>
            <button onclick="hideM('histM')" class="w-full mt-4 py-3 border border-white/10 text-[9px] font-bold text-gray-500 uppercase rounded-xl">Close</button>
        </div>
    </div>

    <div id="depM" class="modal">
        <div class="glass p-6 rounded-[30px] w-full max-w-sm">
            <div id="d0" class="space-y-2">
                <h2 class="text-xs font-black text-center mb-4 uppercase italic">Deposit Method</h2>
                <div onclick="selectDepMethod('crypto')" class="option-card text-center"><p class="text-white text-xs font-bold">Crypto (BEP20)</p></div>
                <div onclick="selectDepMethod('pkr')" class="option-card text-center"><p class="text-white text-xs font-bold">PKR (Local)</p></div>
            </div>
            <div id="d1" class="hidden">
                <input type="number" id="dAmount" oninput="calcUsdDep()" placeholder="Enter Amount" class="auth-input mb-2 text-center">
                <p id="usdConvertDep" class="text-center text-[9px] text-yellow-500 font-bold mb-4 hidden"></p>
                <button onclick="toStepDep(2)" class="w-full btn-small bg-yellow-500 text-black">Next</button>
            </div>
            <div id="d2" class="hidden text-center">
                <img id="depQR" src="" class="mx-auto mb-3 rounded-xl w-40 h-40 object-contain bg-white p-2">
                <p id="cryptoAddr" class="text-[8px] text-gray-500 break-all mb-4 px-2 hidden">0x76ecfe8a3bd89297189e16cdcd275d743fb71a62</p>
                <button onclick="toStepDep(3)" class="w-full btn-small bg-yellow-500 text-black">I Have Paid</button>
            </div>
            <div id="d3" class="hidden space-y-3">
                <input type="text" id="dName" placeholder="Account Name" class="auth-input">
                <input type="number" id="dSent" placeholder="Exact Amount" class="auth-input">
                <input type="text" id="dTxid" placeholder="Transaction ID" class="auth-input">
                <button onclick="submitDep()" class="w-full btn-small bg-green-600 text-white">Submit</button>
            </div>
            <button onclick="hideM('depM')" class="w-full mt-4 text-[9px] font-bold text-gray-600 uppercase text-center">Cancel</button>
        </div>
    </div>

    <div id="witM" class="modal">
        <div class="glass p-6 rounded-[30px] w-full max-w-sm">
            <div id="w0" class="space-y-2">
                <h2 class="text-xs font-black text-center mb-4 uppercase italic">Withdraw Method</h2>
                <div onclick="selectWitMethod('crypto')" class="option-card text-center"><p class="text-white text-xs font-bold">Crypto Wallet</p></div>
                <div onclick="selectWitMethod('pkr')" class="option-card text-center"><p class="text-white text-xs font-bold">PKR Bank/JazzCash</p></div>
            </div>
            <div id="wC" class="hidden space-y-3">
                <select id="wcNet" class="auth-input"><option>USDT (BEP20)</option><option>USDT (TRC20)</option></select>
                <input type="text" id="wcWallet" placeholder="Address" class="auth-input">
                <input type="number" id="wcAmt" placeholder="Amount ($)" class="auth-input">
                <button onclick="submitWitCrypto()" class="w-full btn-small bg-white text-black">Submit</button>
            </div>
            <div id="wP" class="hidden space-y-3">
                <select id="wBank" class="auth-input"><option>JazzCash</option><option>EasyPaisa</option><option>Bank Transfer</option></select>
                <input type="text" id="wAccNum" placeholder="Account Number" class="auth-input">
                <input type="text" id="wAccName" placeholder="Account Name" class="auth-input">
                <input type="number" id="wAmt" placeholder="Amount (PKR)" class="auth-input">
                <button onclick="submitWitPkr()" class="w-full btn-small bg-white text-black">Submit</button>
            </div>
            <button onclick="hideM('witM')" class="w-full mt-4 text-[9px] font-bold text-gray-600 uppercase text-center">Cancel</button>
        </div>
    </div>

    <div id="profileM" class="modal">
        <div class="glass p-6 rounded-[30px] w-full max-w-xs text-center">
            <p id="uEmail" class="text-white font-bold text-[11px] mb-4"></p>
            <button onclick="auth.signOut().then(()=>location.reload())" class="w-full py-3 bg-red-600/10 text-red-600 rounded-xl font-black uppercase text-[9px]">Logout</button>
            <button onclick="hideM('profileM')" class="mt-4 text-[9px] text-gray-600 font-bold uppercase">Back</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", 
            authDomain: "waqas-47f30.firebaseapp.com", 
            projectId: "waqas-47f30", 
            storageBucket: "waqas-47f30.appspot.com", 
            messagingSenderId: "374104279093", 
            appId: "1:374104279093:web:6e1844b60456c700940364" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let currentDepMethod = '', userBalance = 0;

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('authSec').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('uEmail').innerText = user.email;
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    if(doc.exists) {
                        userBalance = doc.data().balance || 0;
                        document.getElementById('balanceDisp').innerText = "$" + userBalance.toFixed(2);
                    }
                });
                // Balance Add Logic (Success status monitor)
                db.collection('requests').where('uid', '==', user.uid).where('status', '==', 'Success').onSnapshot(snap => {
                    snap.docChanges().forEach(change => {
                        if (change.type === "added" || change.type === "modified") {
                            const data = change.doc.data();
                            if(!data.addedToBalance) {
                                const addAmt = data.currency === 'PKR' ? (data.amount / 280) : parseFloat(data.amount);
                                db.collection('users').doc(user.uid).update({ balance: firebase.firestore.FieldValue.increment(addAmt) });
                                db.collection('requests').doc(change.doc.id).update({ addedToBalance: true });
                            }
                        }
                    });
                });
            } else {
                document.getElementById('authSec').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
            }
        });

        async function login() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert(err.message); }
        }

        function showM(id) { document.getElementById(id).style.display = 'flex'; }
        function hideM(id) { document.getElementById(id).style.display = 'none'; }
        function openDep() { showM('depM'); toStepDep(0); }
        function toStepDep(s) { ['d0','d1','d2','d3'].forEach(d => document.getElementById(d).classList.add('hidden')); document.getElementById('d'+s).classList.remove('hidden'); }
        
        function selectDepMethod(m) {
            currentDepMethod = m;
            if(m === 'crypto') {
                document.getElementById('depQR').src = "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=0x76ecfe8a3bd89297189e16cdcd275d743fb71a62";
                document.getElementById('cryptoAddr').classList.remove('hidden');
            } else {
                document.getElementById('depQR').src = "https://i.postimg.cc/HLPQpW92/Screenshot-20260504-033311.jpg";
                document.getElementById('cryptoAddr').classList.add('hidden');
            }
            toStepDep(1);
        }

        function calcUsdDep() {
            if(currentDepMethod === 'pkr') {
                const pkr = document.getElementById('dAmount').value;
                const usd = (pkr / 280).toFixed(2);
                const disp = document.getElementById('usdConvertDep');
                if(pkr > 0) { disp.innerText = `Approx: $${usd}`; disp.classList.remove('hidden'); } else { disp.classList.add('hidden'); }
            }
        }

        async function submitDep() {
            const amt = document.getElementById('dSent').value, tx = document.getElementById('dTxid').value, name = document.getElementById('dName').value;
            if(!amt || !tx) return alert("Fill details");
            await db.collection('requests').add({
                uid: auth.currentUser.uid, email: auth.currentUser.email,
                amount: parseFloat(amt), currency: currentDepMethod === 'crypto' ? 'USD' : 'PKR',
                accountName: name, txid: tx, status: 'Pending', time: Date.now(), addedToBalance: false
            });
            alert("Sent!"); hideM('depM');
        }

        function openWit() { showM('witM'); document.getElementById('w0').classList.remove('hidden'); document.getElementById('wC').classList.add('hidden'); document.getElementById('wP').classList.add('hidden'); }
        function selectWitMethod(m) { document.getElementById('w0').classList.add('hidden'); if(m === 'crypto') document.getElementById('wC').classList.remove('hidden'); else document.getElementById('wP').classList.remove('hidden'); }

        async function submitWitCrypto() {
            const amt = parseFloat(document.getElementById('wcAmt').value);
            if(!amt || userBalance < amt) return alert("Error");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            await db.collection('withdrawals').add({
                uid: auth.currentUser.uid, email: auth.currentUser.email,
                amount: amt, currency: 'USD', bankName: document.getElementById('wcNet').value,
                accountNumber: document.getElementById('wcWallet').value, status: 'Pending', time: Date.now()
            });
            alert("Submitted!"); hideM('witM');
        }

        async function submitWitPkr() {
            const amt = parseFloat(document.getElementById('wAmt').value);
            const usd = amt / 280;
            if(!amt || userBalance < usd) return alert("Error");
            await db.collection('users').doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-usd) });
            await db.collection('withdrawals').add({
                uid: auth.currentUser.uid, email: auth.currentUser.email,
                amount: amt, currency: 'PKR', bankName: document.getElementById('wBank').value,
                accountNumber: document.getElementById('wAccNum').value, status: 'Pending', time: Date.now()
            });
            alert("Submitted!"); hideM('witM');
        }

        async function loadHistory(coll) {
            const list = document.getElementById('historyList');
            list.innerHTML = '<p class="text-center py-10 opacity-50">Loading...</p>';
            db.collection(coll).where('uid', '==', auth.currentUser.uid).onSnapshot(snap => {
                let html = '';
                if(snap.empty) { list.innerHTML = '<p class="text-center py-10">No Records</p>'; return; }
                let docs = []; snap.forEach(doc => docs.push(doc.data()));
                docs.sort((a,b) => b.time - a.time);
                docs.forEach(d => {
                    const st = d.status || 'Pending';
                    html += `<div class="history-card">
                        <div><p class="font-black text-white uppercase">${coll==='requests'?'Dep':'Wit'}</p><p class="text-[7px] text-gray-500 uppercase">${d.txid||d.bankName}</p></div>
                        <div class="text-right"><p class="font-black ${coll==='requests'?'text-green-500':'text-red-500'}">${d.currency==='USD'?'$':'Rs.'}${d.amount}</p><span class="status-badge ${st.toLowerCase()}">${st}</span></div>
                    </div>`;
                });
                list.innerHTML = html;
            });
        }
    </script>
</body>
</html>
