<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | Dubai Live Trade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#05070a] text-white p-4 font-sans min-h-screen flex flex-col items-center">
    
    <div id="authBox" class="w-full max-w-sm mt-10 bg-[#111827] p-8 rounded-[35px] border border-white/5 shadow-2xl">
        <h1 id="authTitle" class="text-2xl font-black text-center mb-8 text-yellow-500 italic uppercase">Partner Login</h1>
        <div class="space-y-4">
            <input type="email" id="affEmail" placeholder="Partner Email" class="w-full p-4 bg-gray-900 rounded-2xl border border-gray-800 outline-none text-sm focus:border-yellow-500">
            <input type="password" id="affPass" placeholder="Password" class="w-full p-4 bg-gray-900 rounded-2xl border border-gray-800 outline-none text-sm focus:border-yellow-500">
            <button onclick="handleAffAuth()" id="authBtn" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl uppercase shadow-lg shadow-yellow-500/10 active:scale-95 transition">Sign In</button>
            <p id="toggleText" class="text-center mt-6 text-[10px] text-gray-400 uppercase font-bold cursor-pointer hover:text-yellow-500" onclick="toggleAuth()">New Partner? Join Now</p>
        </div>
    </div>

    <div id="dashBox" class="hidden w-full max-w-lg mt-4">
        <div class="flex justify-between items-center mb-8 px-2">
            <h2 class="text-xl font-black italic text-yellow-500">DASHBOARD</h2>
            <button onclick="auth.signOut().then(()=>location.reload())" class="text-[9px] bg-red-500/10 text-red-500 px-4 py-2 rounded-xl font-black uppercase border border-red-500/20">Logout</button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-gray-900 p-6 rounded-[28px] border border-white/5 text-center">
                <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Clicks</p>
                <h2 id="c_clicks" class="text-2xl font-black text-white">0</h2>
            </div>
            <div class="bg-gray-900 p-6 rounded-[28px] border border-white/5 text-center">
                <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Registers</p>
                <h2 id="c_users" class="text-2xl font-black text-white">0</h2>
            </div>
        </div>

        <div class="bg-gradient-to-br from-yellow-500 to-yellow-600 text-black p-8 rounded-[35px] mb-8 shadow-xl text-center relative overflow-hidden">
            <p class="text-[10px] font-black uppercase opacity-60">Earnings (40% Share)</p>
            <h1 id="c_comm" class="text-5xl font-black mt-1">$0.00</h1>
        </div>

        <div class="bg-gray-900 p-8 rounded-[35px] border border-white/5 mb-8 text-center">
            <p class="text-[10px] text-gray-500 font-bold uppercase mb-4 tracking-widest">Promotion Link</p>
            <div class="bg-black/40 p-4 rounded-2xl border border-white/5 mb-6">
                <p id="refLink" class="text-[11px] text-yellow-500 font-bold italic truncate">Generating...</p>
            </div>
            <button onclick="copyRef()" class="w-full py-4 bg-white text-black font-black rounded-2xl text-[10px] uppercase tracking-widest">Copy Referral Link</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        let authMode = 'login';
        function toggleAuth() {
            authMode = (authMode === 'login') ? 'reg' : 'login';
            document.getElementById('authTitle').innerText = (authMode === 'reg') ? 'PARTNER REGISTER' : 'PARTNER LOGIN';
            document.getElementById('authBtn').innerText = (authMode === 'reg') ? 'JOIN PROGRAM' : 'SIGN IN';
            document.getElementById('toggleText').innerText = (authMode === 'reg') ? 'Have an account? Login' : 'New Partner? Join Now';
        }

        async function handleAffAuth() {
            const e = document.getElementById('affEmail').value, p = document.getElementById('affPass').value;
            if(!e || !p) return alert("Fill all fields");
            try {
                if(authMode === 'reg') {
                    const res = await auth.createUserWithEmailAndPassword(e, p);
                    const rid = "DT" + Math.floor(1000 + Math.random() * 9000);
                    await db.collection('affiliates').doc(res.user.uid).set({
                        email: e, refID: rid, clicks: 0, totalUsers: 0, totalCommission: 0, time: Date.now()
                    });
                    alert("Partner Account Created!");
                } else { await auth.signInWithEmailAndPassword(e, p); }
            } catch(err) { alert(err.message); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('authBox').classList.add('hidden');
                document.getElementById('dashBox').classList.remove('hidden');
                db.collection('affiliates').doc(user.uid).onSnapshot(doc => {
                    const data = doc.data();
                    if(data) {
                        document.getElementById('c_clicks').innerText = data.clicks || 0;
                        document.getElementById('c_users').innerText = data.totalUsers || 0;
                        document.getElementById('c_comm').innerText = "$" + (data.totalCommission || 0).toFixed(2);
                        document.getElementById('refLink').innerText = "https://dubailivetrade.online/go.html?ref=" + data.refID;
                    }
                });
            }
        });

        function copyRef() {
            const link = document.getElementById('refLink').innerText;
            navigator.clipboard.writeText(link);
            alert("Copied!");
        }
    </script>
</body>
</html>
