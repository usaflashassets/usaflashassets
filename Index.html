<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dubai Live Trade | Affiliate Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .stat-card { background: linear-gradient(135deg, #111827 0%, #030712 100%); border: 1px solid rgba(59, 130, 246, 0.1); padding: 20px; border-radius: 24px; text-align: center; }
        .auth-input { background: #1a1f29; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; }
        #appTerminal { display: none; min-height: 100vh; flex-direction: column; padding: 15px; }
        .btn-blue { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        .btn-blue:active { transform: scale(0.95); }
        #loadingScreen { position: fixed; inset: 0; background: #05070a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-spin { width: 40px; height: 40px; border: 4px solid #1a1f29; border-top: 4px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loader-spin"></div>
        <p class="mt-4 text-[10px] font-bold text-blue-500 uppercase tracking-widest italic">Dubai Live Trade Affiliate...</p>
    </div>

    <div id="authSection" class="min-h-screen flex items-center justify-center p-4" style="display:none;">
        <div class="glass-card w-full max-w-sm p-8 rounded-[32px]">
            <h1 class="text-3xl font-black text-center mb-8 uppercase italic text-blue-500">Affiliate</h1>
            <div class="flex bg-black/40 p-1.5 rounded-2xl mb-8">
                <button onclick="switchAuth('login')" id="loginTab" class="flex-1 py-3 text-sm font-bold">Login</button>
                <button onclick="switchAuth('reg')" id="regTab" class="flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl">Registration</button>
            </div>
            <input type="email" id="userEmail" placeholder="Email" class="auth-input mb-4">
            <input type="password" id="userPass" placeholder="Password" class="auth-input mb-6">
            <button onclick="handleAuth()" id="authBtn" class="w-full py-4 btn-blue text-white font-black rounded-2xl uppercase">Registration</button>
        </div>
    </div>

    <div id="appTerminal">
        <header class="flex justify-between items-center mb-6">
            <div>
                <p class="text-[8px] text-gray-500 font-bold uppercase tracking-widest">Affiliate Dashboard</p>
                <h1 id="userEmailDisp" class="text-sm font-black text-white italic">...</h1>
            </div>
            <button onclick="auth.signOut().then(()=>location.reload())" class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl text-[10px] font-bold uppercase">Logout</button>
        </header>

        <main class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="stat-card">
                    <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Clicks</p>
                    <h2 id="statClicks" class="text-2xl font-black text-white">0</h2>
                </div>
                <div class="stat-card">
                    <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Users</p>
                    <h2 id="statUsers" class="text-2xl font-black text-white">0</h2>
                </div>
                <div class="stat-card col-span-2">
                    <p class="text-[10px] text-gray-500 font-bold uppercase mb-1">Total Deposit Amount</p>
                    <h2 id="statDepAmt" class="text-3xl font-black text-green-500">$0.00</h2>
                </div>
                <div class="stat-card col-span-2 border-yellow-500/20">
                    <p class="text-[10px] text-yellow-500/50 font-bold uppercase mb-1">Your 40% Commission</p>
                    <h2 id="statCommission" class="text-3xl font-black text-yellow-500">$0.00</h2>
                </div>
            </div>

            <div class="glass-card p-6 rounded-[28px] text-center border border-blue-500/20">
                <button onclick="generateLink()" class="w-full py-4 btn-blue text-white font-black rounded-2xl uppercase text-xs mb-4">Generate Unique Link</button>
                <div id="linkBox" class="hidden">
                    <p class="text-[9px] text-gray-500 font-bold uppercase mb-2">Copy your link below:</p>
                    <div class="bg-black/60 p-3 rounded-xl flex items-center gap-3">
                        <input id="affLinkInput" type="text" readonly class="bg-transparent text-[10px] text-blue-400 font-bold flex-grow outline-none overflow-hidden" value="">
                        <button onclick="copyLink()" class="text-[10px] text-white font-black uppercase">Copy</button>
                    </div>
                </div>
            </div>

            <div class="glass-card p-6 rounded-[28px]">
                <h3 class="text-[10px] font-black text-gray-500 uppercase mb-4">Referral Users & Deposits</h3>
                <div id="userList" class="space-y-3">
                    <p class="text-xs text-gray-600 italic">No activity yet...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAySRA1YSpTpmC8WjnKmDhnNMHkEmkeP50", authDomain: "waqas-47f30.firebaseapp.com", projectId: "waqas-47f30", storageBucket: "waqas-47f30.appspot.com", messagingSenderId: "374104279093", appId: "1:374104279093:web:6e1844b60456c700940364" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let mode = 'reg';

        // 1. Referral Capture Logic
        const urlParams = new URLSearchParams(window.location.search);
        const refID = urlParams.get('ref');
        if(refID) {
            localStorage.setItem('activeRef', refID);
            db.collection('affiliateStats').doc(refID).set({
                clicks: firebase.firestore.FieldValue.increment(1)
            }, { merge: true });
        }

        auth.onAuthStateChanged(user => {
            document.getElementById('loadingScreen').style.display = 'none';
            if(user) {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('appTerminal').style.display = 'flex';
                loadStats(user);
            } else {
                document.getElementById('authSection').style.display = 'flex';
                document.getElementById('appTerminal').style.display = 'none';
            }
        });

        async function loadStats(user) {
            document.getElementById('userEmailDisp').innerText = user.email;
            
            // Live Stats (Clicks, Users, Total Deposit)
            db.collection('affiliateStats').doc(user.uid).onSnapshot(doc => {
                if(doc.exists) {
                    const data = doc.data();
                    const totalDep = data.totalDeposit || 0;
                    document.getElementById('statClicks').innerText = data.clicks || 0;
                    document.getElementById('statUsers').innerText = data.registrations || 0;
                    document.getElementById('statDepAmt').innerText = "$" + totalDep.toFixed(2);
                    // 40% Commission Calculation
                    document.getElementById('statCommission').innerText = "$" + (totalDep * 0.40).toFixed(2);
                }
            });

            // Reffered Users List
            db.collection('users').where('referredBy', '==', user.uid).onSnapshot(snap => {
                const list = document.getElementById('userList');
                list.innerHTML = "";
                if(snap.empty) {
                    list.innerHTML = `<p class="text-xs text-gray-600 italic">No referrals found.</p>`;
                    return;
                }
                snap.forEach(doc => {
                    const u = doc.data();
                    list.innerHTML += `
                        <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5">
                            <span class="text-[10px] font-bold">${u.email}</span>
                            <span class="text-[10px] font-black text-green-500">$${(u.totalDeposited || 0).toFixed(2)}</span>
                        </div>`;
                });
            });
        }

        function generateLink() {
            const user = auth.currentUser;
            if(user) {
                const link = "https://dubailivetrade.online/?ref=" + user.uid;
                document.getElementById('affLinkInput').value = link;
                document.getElementById('linkBox').classList.remove('hidden');
            }
        }

        async function handleAuth() {
            const e = document.getElementById('userEmail').value, p = document.getElementById('userPass').value;
            try {
                if(mode === 'reg') {
                    const r = await auth.createUserWithEmailAndPassword(e, p);
                    const referrer = localStorage.getItem('activeRef') || "direct";
                    await db.collection('users').doc(r.user.uid).set({
                        email: e, balance: 0, referredBy: referrer, totalDeposited: 0, tradeMode: 'normal'
                    });
                    if(referrer !== "direct") {
                        await db.collection('affiliateStats').doc(referrer).set({
                            registrations: firebase.firestore.FieldValue.increment(1)
                        }, { merge: true });
                    }
                } else { await auth.signInWithEmailAndPassword(e, p); }
            } catch(err) { alert(err.message); }
        }

        function switchAuth(t) {
            mode = t;
            document.getElementById('loginTab').className = t==='login' ? 'flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl' : 'flex-1 py-3 text-sm font-bold';
            document.getElementById('regTab').className = t==='reg' ? 'flex-1 py-3 text-sm font-bold bg-[#2d3748] rounded-xl' : 'flex-1 py-3 text-sm font-bold';
            document.getElementById('authBtn').innerText = t==='login' ? 'Login' : 'Registration';
        }

        function copyLink() {
            const linkInput = document.getElementById('affLinkInput');
            linkInput.select();
            document.execCommand('copy');
            alert("Link Copied! Apne doston ke sath share karein.");
        }
    </script>
</body>
</html>
